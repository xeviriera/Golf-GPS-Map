<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Golf GPS PRO</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Golf GPS</h1>

<div id="holesBar">
  <button class="holeBtn active" data-id="1">1</button>
  <button class="holeBtn" data-id="2">2</button>
  <button class="holeBtn" data-id="3">3</button>
  <button class="holeBtn" data-id="4">4</button>
  <button class="holeBtn" data-id="5">5</button>
  <button class="holeBtn" data-id="6">6</button>
  <button class="holeBtn" data-id="7">7</button>
  <button class="holeBtn" data-id="8">8</button>
  <button class="holeBtn" data-id="9">9</button>
</div>

<div id="map"></div>

<div id="panel">
  <p id="distances"></p>
</div>

<script src="app.js"></script>
</body>
</html>
